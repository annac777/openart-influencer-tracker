    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #ffffff; --surface: #f8f9fa; --surface2: #f0f1f3;
      --border: #e2e5e9; --text: #1a1a1a; --text2: #6b7280;
      --accent: #7c3aed; --accent2: #6d28d9;
      --green: #16a34a; --red: #dc2626; --orange: #d97706;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }

    .header {
      padding: 14px 28px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header h1 span { color: var(--accent2); }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 600; color: var(--green);
    }
    .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .scrape-btns { display: flex; gap: 6px; }
    .scrape-btn {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      background: var(--surface); color: var(--text); transition: all .15s;
      display: flex; align-items: center; gap: 5px; font-family: inherit;
    }
    .scrape-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
    .scrape-btn.deep { background: #f3f0ff; border-color: #c4b5fd; color: var(--accent2); }
    .scrape-btn.deep:hover { background: #ede9fe; }
    .scrape-btn.single { background: #f0fdf4; border-color: #86efac; color: var(--green); }
    .scrape-btn.single:hover { background: #dcfce7; }
    .scrape-btn:disabled { opacity: .5; cursor: not-allowed; }
    .scrape-btn .scrape-icon { font-size: 12px; }
    .scrape-btn.running { animation: pulse 1s infinite; }

    .scrape-toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--text); color: white; padding: 12px 20px;
      border-radius: 12px; font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      display: none; align-items: center; gap: 10px;
      max-width: 400px;
    }
    .scrape-toast.show { display: flex; }
    .scrape-toast .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stats-bar {
      display: grid; grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--border);
    }
    .stat { padding: 14px 20px; border-right: 1px solid var(--border); text-align: center; }
    .stat:last-child { border-right: none; }
    .stat-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
    .stat-val { font-size: 22px; font-weight: 800; margin-top: 2px; }
    .stat-val.purple { color: var(--accent2); }
    .stat-val.red { color: var(--red); }
    .stat-sub { font-size: 10px; color: var(--text2); margin-top: 1px; }

    /* All-Time Impact section */
    .impact-bar {
      display: grid; grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .impact-stat { padding: 10px 16px; text-align: center; border-right: 1px solid var(--border); }
    .impact-stat:last-child { border-right: none; }
    .impact-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .impact-val { font-size: 16px; font-weight: 800; color: var(--accent2); margin-top: 1px; }
    .impact-delta { font-size: 9px; color: var(--green); font-weight: 600; }
    .impact-delta.neg { color: var(--red); }

    /* Growth badge on post cards */
    .growth-badge {
      display: inline-flex; align-items: center; gap: 2px;
      font-size: 9px; font-weight: 700; padding: 1px 5px;
      border-radius: 4px; margin-left: 6px;
    }
    .growth-badge.up { background: rgba(34,197,94,.12); color: var(--green); }
    .growth-badge.down { background: rgba(239,68,68,.12); color: var(--red); }

    .layout { display: flex; height: calc(100vh - 110px); }

    .sidebar {
      width: 260px; min-width: 260px; border-right: 1px solid var(--border);
      overflow-y: auto; flex-shrink: 0;
    }
    .sidebar-title {
      padding: 14px 16px 10px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px; color: var(--text2);
    }
    .inf-item {

      border-bottom: 1px solid var(--border);
      transition: background .1s;
      display: flex; align-items: center; gap: 10px;
    }
    .inf-item:hover { background: var(--surface); }
    .inf-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
    .inf-avatar {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;

    .inf-info { flex: 1; min-width: 0; }
    .inf-name { font-size: 13px; font-weight: 600; }
    .inf-meta { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
    .inf-badge {

    .inf-compliance {

      padding: 2px 8px; border-radius: 8px;
    }
    .inf-compliance.good { background: rgba(34,197,94,.15); color: var(--green); }
    .inf-compliance.bad { background: rgba(239,68,68,.15); color: var(--red); }
    .inf-compliance.na { background: rgba(113,113,122,.15); color: var(--text2); }

    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

    /* Detail header + weekly compliance always visible */
    .detail-top {
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
    }
    .detail-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
    }
    .detail-avatar {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 800;
    }
    .detail-name { font-size: 18px; font-weight: 800; }
    .detail-handle { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .detail-tags { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .detail-tag {
      padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 600;
      background: var(--surface2); color: var(--text2);
    }
    .detail-tag.type { background: rgba(124,58,237,.15); color: var(--accent2); }
    .detail-right-stats { display: flex; gap: 16px; margin-left: auto; }
    .detail-stat { text-align: center; }
    .detail-stat-val { font-size: 16px; font-weight: 800; }
    .detail-stat-label { font-size: 9px; color: var(--text2); text-transform: uppercase; }

    /* Weekly grid — always visible under header */
    .weekly-section {}
    .weekly-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text2); margin-bottom: 8px;
    }
    .week-grid {
      display: flex; gap: 6px;
    }
    .wk {
      flex: 1; border-radius: 6px; padding: 6px 4px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      min-width: 0;
    }
    .wk-date { font-size: 9px; color: var(--text2); margin-bottom: 3px; white-space: nowrap; }
    .wk-icon { font-size: 14px; }
    .wk-label { font-size: 8px; margin-top: 2px; font-weight: 700; }
    .wk.posted { background: rgba(34,197,94,.06); border-color: rgba(34,197,94,.25); }
    .wk.posted .wk-label { color: var(--green); }
    .wk.branded { background: rgba(124,58,237,.06); border-color: rgba(124,58,237,.25); }
    .wk.branded .wk-label { color: var(--accent2); }
    .wk.missed { background: rgba(239,68,68,.05); border-color: rgba(239,68,68,.15); }
    .wk.missed .wk-label { color: var(--red); }
    .wk.na { opacity: .3; }

    }
    .comp-fill-track {
      flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden;
    }
    .comp-fill {
      height: 100%; border-radius: 2px; transition: width .3s;

    /* Tabs */
    .tabs {

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-color: var(--accent); }

    .tab-content { flex: 1; overflow-y: auto; }
    .tab-panel { display: none; padding: 20px 28px; }
    .tab-panel.active { display: block; }

    /* Post cards */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .post-card.oa { border-color: rgba(124,58,237,.35); }

      padding: 8px 12px; display: flex; align-items: center; gap: 8px;

    .pc-body { padding: 10px 12px; font-size: 12px; line-height: 1.6; }
    .pc-body .mention { color: var(--accent2); font-weight: 600; }
    .pc-metrics {

      display: flex; gap: 14px; font-size: 11px; color: var(--text2);
    }
    .pc-m { display: flex; align-items: center; gap: 3px; }
    .pc-m svg { width: 12px; height: 12px; }
    .pc-m.hot { color: var(--green); font-weight: 600; }

    /* Contract grid */
    .cg-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .cg-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    .cg-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .cg-val { font-size: 13px; font-weight: 700; }
    .cg-val.sm { font-size: 12px; font-weight: 600; line-height: 1.5; }

    .section-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--text2); margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);

      color: white; padding: 5px 12px; border-radius: 7px;
      text-decoration: none; font-size: 11px; font-weight: 700;

    }
    .empty-state svg { width: 48px; height: 48px; opacity: .3; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

// ===== AUTO-CALCULATE WEEKLY FROM POSTS =====
// Map a post date like "Mar 14" to the week column it belongs to
function dateToWeekIdx(timeStr) {
  const M = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5};
  const parts = timeStr.split(' ');
  const month = M[parts[0]]; const day = parseInt(parts[1]);
  // Week boundaries (start dates): Feb 9, Feb 16, Feb 23, Mar 2, Mar 9, Mar 16, Mar 23
  const bounds = [[1,9],[1,16],[1,23],[2,2],[2,9],[2,16],[2,23],[2,30],[3,6]];
  for (let i = bounds.length - 1; i >= 0; i--) {
    const [bm, bd] = bounds[i];
    if (month > bm || (month === bm && day >= bd)) return i;
  }
  return -1; // before tracking period
}

function calcWeekly(inf) {
  if (inf.status !== 'signed') return WEEKS.map(()=>'na');
  const w = WEEKS.map(()=>'na');

  // Determine start week index from startDate
  const startIdx = inf.startDate ? dateToWeekIdx(inf.startDate) : 0;
  for (let i = Math.max(0, startIdx); i < WEEKS.length; i++) w[i] = 'missed';

  // Count posts per week
  const postCount = WEEKS.map(()=>0);
  const postType = WEEKS.map(()=>'');

  // Only collab posts count toward weekly compliance; @mentions don't
  inf.openartPosts.forEach(p => {
    if (!p.collab) return; // skip @mentions
    const idx = dateToWeekIdx(p.time);
    if (idx >= 0 && idx < WEEKS.length) { postCount[idx]++; postType[idx] = p.branded ? 'branded' : (postType[idx] === 'branded' ? 'branded' : 'posted'); }
  });

  // First pass: mark weeks that have posts
  for (let i = 0; i < WEEKS.length; i++) {
    if (postCount[i] > 0 && w[i] !== 'na') w[i] = postType[i] || 'posted';
  }

  // Second pass: redistribute excess posts to fill missed weeks (backfill)
  // If a week has >1 post, use excess to fill nearest missed weeks before it
  for (let i = 0; i < WEEKS.length; i++) {
    if (postCount[i] > 1) {
      let excess = postCount[i] - 1;
      // Backfill: look backwards for missed weeks
      for (let j = i - 1; j >= 0 && excess > 0; j--) {
        if (w[j] === 'missed') {
          w[j] = postType[i] || 'branded';
          excess--;
        }
      }
      // Forward fill if still excess
      for (let j = i + 1; j < 7 && excess > 0; j++) {
        if (w[j] === 'missed') {
          w[j] = postType[i] || 'branded';
          excess--;
        }
      }
    }
  }

  return w;
}

// Apply auto-calculation to all influencers
influencers.forEach(inf => { inf.weekly = calcWeekly(inf); });

// ===== HELPERS =====
function fmt(n) {
  if (n === undefined || n === null || isNaN(n) || n === 0) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(n>=1e4?0:1)+'K';
  return n;
}

function getCompliance(inf) {
  if (inf.status !== 'signed') return { rate: null, posted: 0, total: 0, missed: 0 };
  const active = inf.weekly.filter(w => w !== 'na');
  const posted = active.filter(w => w === 'posted' || w === 'branded').length;
  return { rate: active.length > 0 ? posted / active.length : 0, posted, total: active.length, missed: active.length - posted };
}

// ===== SNAPSHOT DATA =====
let lastSnapshot = null;
let prevSnapshot = null;

async function loadSnapshots() {
  try {
    const res = await fetch('/api/snapshots');
    const data = await res.json();
    if (data.snapshots && data.snapshots.length > 0) {
      lastSnapshot = data.snapshots[data.snapshots.length - 1];
      if (data.snapshots.length > 1) prevSnapshot = data.snapshots[data.snapshots.length - 2];
    }
  } catch(_) {}
}

function getGrowth(url) {
  if (!lastSnapshot || !prevSnapshot) return null;
  const curr = lastSnapshot.metrics[url];
  const prev = prevSnapshot.metrics[url];
  if (!curr || !prev) return null;
  return {
    likes: curr.likes - prev.likes,
    comments: curr.comments - prev.comments,
    views: curr.views - prev.views
  };
}

async function takeSnapshot() {
  const posts = [];
  influencers.forEach(inf => {
    inf.openartPosts.forEach(p => {
      posts.push({ handle: inf.handle, url: p.url || `${inf.handle}:${p.time}`, time: p.time, likes: p.likes || 0, comments: p.comments || 0, views: p.views || 0 });
    });
  });
  try {
    await fetch('/api/snapshots', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ posts }) });
    await loadSnapshots();
    showToast('📸 Snapshot saved — ' + posts.length + ' posts recorded');
  } catch(e) { showToast('❌ Snapshot failed'); }
}

function renderStats() {

  const totalW = signed.reduce((s,i) => s + i.weekly.filter(w=>w!=='na').length, 0);
  const postedW = signed.reduce((s,i) => s + i.weekly.filter(w=>w==='posted'||w==='branded').length, 0);

  const rate = totalW > 0 ? Math.round(postedW / totalW * 100) : 0;

  const posting = signed.filter(i=>i.openartPosts.length>0).length;

    ['Posting', posting+'/'+signed.length, posting<signed.length?'red':''],
    ['@OpenArt Posts', oaM, 'purple'],
    ['Compliance', rate+'%', rate<70?'red':''],

  ].map(([l,v,c])=>`<div class="stat"><div class="stat-label">${l}</div><div class="stat-val ${c}">${v}</div></div>`).join('');

  influencers.forEach(inf => {

  document.getElementById('impactBar').innerHTML = [

function formatCaption(p) {
  let raw = p.text.replace(/<[^>]*>/g, '').replace(/&#064;/g,'@').replace(/&amp;/g,'&');
  // Already formatted with "Collab w/ ... —" or "@openart ..."
  if (raw.match(/^(Collab w\/|@openart)/i)) {
    const dash = raw.indexOf('—');
    if (dash > 0) {
      let title = raw.substring(dash + 1).trim();
      if (title.length > 55) title = title.substring(0, 52) + '...';
      return raw.substring(0, dash + 2) + title;
    }
    return raw.length > 80 ? raw.substring(0, 77) + '...' : raw;
  }
  // Raw caption — clean up and shorten
  raw = raw.replace(/^['']s\s+/, '');
  // Don't split on dots inside @handles
  let safe = raw.replace(/@[\w.]+/g, m => m.replace(/\./g, '\u0000'));
  let first = safe.split(/[.!?\n]/)[0].replace(/\u0000/g, '.').trim();
  if (first.length > 55) first = first.substring(0, 52) + '...';
  return first || raw.substring(0, 55);
}

// ===== ADD POST =====
async function loadExtraPosts() {
  try {
    const res = await fetch('/api/posts');
    if (!res.ok) return;
    const db = await res.json();
    // Merge extra posts into influencer data
    for (const [handle, posts] of Object.entries(db)) {
      const inf = influencers.find(i => i.handle === handle);
      if (!inf) continue;
      posts.forEach(p => {
        const exists = inf.openartPosts.some(ep => (ep.url && ep.url === p.url) || ep.time === p.time);
        if (!exists) {
          const post = { text: p.text, time: p.time, likes: parseInt(p.likes)||0, comments: parseInt(p.comments)||0, views: parseInt(p.views)||0, url: p.url, collab: p.collab || false, branded: p.branded || false };
          if (p.isOpenArt) inf.openartPosts.push(post);
          else inf.otherPosts.push(post);
        }
      });
    }
    // Recalc weekly
    influencers.forEach(inf => { inf.weekly = calcWeekly(inf); });
  } catch(_) {}
}

async function fetchPostMeta() {
  const url = document.getElementById('ap-url').value.trim();
  if (!url) return;
  const btn = document.getElementById('ap-fetch-btn');
  const status = document.getElementById('ap-status');
  btn.textContent = '...';
  btn.disabled = true;
  status.style.display = 'block';
  status.textContent = 'Fetching post metadata...';

  try {
    const res = await fetch('/api/fetch-post?url=' + encodeURIComponent(url));
    const data = await res.json();

    if (data.ok && (data.caption || data.isCollab)) {
      // Auto-generate clean title
      let rawCap = (data.caption || '').replace(/&#064;/g, '@').replace(/&amp;/g, '&').replace(/&#x27;/g, "'");
      // Remove leading username
      rawCap = rawCap.replace(/^[\w.]+\s*/, '');
      // Get first short phrase — split on punctuation/newline, pick the shortest meaningful chunk
      let sentences = rawCap.split(/[.!?\n,]/).map(s=>s.trim()).filter(s=>s.length>5);
      let shortCap = sentences[0] || rawCap.substring(0,60);
      // If still long, try splitting on common connectors
      if (shortCap.length > 60) {
        const parts = shortCap.split(/\s+(and|but|with|for|so|because|if|or|—)\s+/i);
        shortCap = parts[0];
      }
      // Format as clean title
      const prefix = data.isCollab ? "Collab w/ <span class='mention'>@openart_ai</span>" : "@<span class='mention'>openart_ai</span>";
      const fullText = prefix + (shortCap ? ' — ' + shortCap : '');
      document.getElementById('ap-text').value = fullText;

      if (data.date) document.getElementById('ap-time').value = data.date;
      if (data.likes > 1) document.getElementById('ap-likes').value = data.likes;
      if (data.comments) document.getElementById('ap-comments').value = data.comments;
      document.getElementById('ap-oa').checked = data.mentionsOpenArt || data.isCollab;
      document.getElementById('ap-branded').checked = data.branded;
      document.getElementById('ap-type').textContent = data.type === 'collab' ? 'Collab w/ OpenArt' : data.type === '@mention' ? '@mention OpenArt' : '';
      status.textContent = '✓ ' + (data.isCollab ? 'Collab' : '@mention') + (data.likes > 1 ? ` — ${fmt(data.likes)} likes` : '') + (data.comments ? `, ${data.comments} comments` : '') + (data.features?.length ? ` — ${data.features.join(', ')}` : '');
      status.style.color = 'var(--green)';
      document.getElementById('ap-login-hint').style.display = 'none';
    } else {
      status.textContent = '⚠ This post is restricted — fill in manually';
      status.style.color = 'var(--orange)';
    }
  } catch(e) {
    status.textContent = '⚠ Fetch failed — fill manually';
    status.style.color = 'var(--orange)';
  }
  btn.textContent = 'Fetch';
  btn.disabled = false;
}

async function submitPost(handle) {

// ===== SCRAPER UI =====
let scrapeRunning = false;

function showToast(msg, isRunning = false) {
  let toast = document.getElementById('scrapeToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'scrapeToast';
    toast.className = 'scrape-toast';
    document.body.appendChild(toast);
  }
  toast.innerHTML = (isRunning ? '<div class="spinner"></div>' : '') + msg;
  toast.classList.add('show');
  if (!isRunning) setTimeout(() => toast.classList.remove('show'), 4000);
}

function hideToast() {
  const toast = document.getElementById('scrapeToast');
  if (toast) toast.classList.remove('show');
}

function setBtnsDisabled(disabled) {
  scrapeRunning = disabled;
  document.querySelectorAll('.scrape-btn').forEach(b => {
    b.disabled = disabled;
    if (disabled) b.classList.add('running');
    else b.classList.remove('running');
  });
}

async function runScrape(mode) {
  if (scrapeRunning) return;
  setBtnsDisabled(true);

  const label = mode === 'deep' ? 'Deep scanning all profiles...' : 'Quick scanning all profiles...';
  showToast(label, true);

  try {
    const res = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    // Poll for completion
    pollScrape();
  } catch (e) {
    showToast('❌ ' + e.message);
    setBtnsDisabled(false);
  }
}

async function runScrapeSingle() {
  if (scrapeRunning) return;
  const inf = influencers[currentIdx];
  if (!inf) return;
  setBtnsDisabled(true);
  showToast(`Scanning @${inf.handle}...`, true);

  try {
    const res = await fetch('/api/scrape', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'single', handle: inf.handle })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    pollScrape();
  } catch (e) {
    showToast('❌ ' + e.message);
    setBtnsDisabled(false);
  }
}

async function pollScrape() {
  const check = async () => {
    try {
      const res = await fetch('/api/scrape');
      const data = await res.json();
      if (data.running) {
        setTimeout(check, 3000);
      } else {
        setBtnsDisabled(false);
        if (data.data) {
          applyScrapeData(data.data);
          const count = Object.keys(data.data).filter(k => !k.startsWith('_')).length;
          showToast(`✅ Done! Updated ${count} profiles`);
        } else {
          showToast('✅ Scrape complete');
        }
      }
    } catch (e) {
      setTimeout(check, 3000);
    }
  };
  setTimeout(check, 3000);
}

function applyScrapeData(data) {
  let updated = 0;
  influencers.forEach(inf => {
    const scraped = data[inf.handle];
    if (scraped && !scraped.error) {
      if (scraped.followers > 0) {
        inf.followers = scraped.followers;
        updated++;
      }
    }
  });
  if (updated > 0) {
    influencers.forEach(inf => { inf.weekly = calcWeekly(inf); });
    renderStats();
    renderList();
    selectInf(currentIdx);
  }
}

// ===== DELETE / EDIT POST =====
async function deletePost(handle, url, time) {
  if (!confirm('Delete this post?')) return;
  const inf = influencers.find(i => i.handle === handle);
  if (!inf) return;
  const idx = inf.openartPosts.findIndex(p => (p.url && p.url === url) || p.time === time);
  if (idx >= 0) {
    inf.openartPosts.splice(idx, 1);
    inf.weekly = calcWeekly(inf);
    await fetch('/api/deleted', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({handle, url, time}) });
    renderStats(); renderList(); selectInf(currentInf);
  }
}

// ===== EXPORT CSV =====
function exportCSV() {
  const signed = influencers.filter(i => i.status === 'signed');
  const totalReach = influencers.reduce((s,i) => s + i.followers, 0);
  const totalPosts = influencers.reduce((s,i) => s + i.openartPosts.length, 0);
  const totalCollabs = influencers.reduce((s,i) => s + i.openartPosts.filter(p => p.collab).length, 0);
  const totalMentions = influencers.reduce((s,i) => s + i.openartPosts.filter(p => !p.collab).length, 0);
  const totalBranded = influencers.reduce((s,i) => s + i.openartPosts.filter(p => p.branded).length, 0);
  const totalLikes = influencers.reduce((s,i) => s + i.openartPosts.reduce((ss,p) => ss + (p.likes||0), 0), 0);
  const totalComments = influencers.reduce((s,i) => s + i.openartPosts.reduce((ss,p) => ss + (p.comments||0), 0), 0);
  const totalViews = influencers.reduce((s,i) => s + i.openartPosts.reduce((ss,p) => ss + (p.views||0), 0), 0);
  const totalW = signed.reduce((s,i) => s + i.weekly.filter(w=>w!=='na').length, 0);
  const postedW = signed.reduce((s,i) => s + i.weekly.filter(w=>w==='posted'||w==='branded').length, 0);
  const compRate = totalW > 0 ? Math.round(postedW / totalW * 100) : 0;

  const rows = [];

  // Overview section
  rows.push(['=== OVERVIEW ===']);
  rows.push(['Report Date', new Date().toISOString().slice(0,10)]);
  rows.push(['Total Partners', influencers.length]);
  rows.push(['Active (Signed)', signed.length]);
  rows.push(['Pending', influencers.filter(i => i.status === 'pending').length]);
  rows.push(['Total Reach (Followers)', totalReach]);
  rows.push(['Total @OpenArt Posts', totalPosts]);
  rows.push(['Collab Posts', totalCollabs]);
  rows.push(['@Mention Posts', totalMentions]);
  rows.push(['Branded Posts (feature promo)', totalBranded]);
  rows.push(['Total Likes', totalLikes]);
  rows.push(['Total Comments', totalComments]);
  rows.push(['Total Views', totalViews]);
  rows.push(['Compliance Rate', compRate + '%']);
  rows.push(['Weeks Delivered', postedW + '/' + totalW]);
  rows.push(['Weeks Missed', (totalW - postedW) + '/' + totalW]);
  rows.push([]);

  // Per-partner summary
  rows.push(['=== PARTNER SUMMARY ===']);
  rows.push(['Influencer','Handle','Followers','Status','Creator','Collab Posts','@Mentions','Branded','Compliance','Contract Period','Deliverable','Cash']);
  influencers.forEach(inf => {
    const comp = getCompliance(inf);
    const compPct = comp.rate === null ? 'N/A' : Math.round(comp.rate * 100) + '%';
    rows.push([
      inf.name, '@'+inf.handle, inf.followers, inf.status, inf.creator,
      inf.openartPosts.filter(p => p.collab).length,
      inf.openartPosts.filter(p => !p.collab).length,
      inf.openartPosts.filter(p => p.branded).length,
      compPct,
      inf.contract.period, (inf.contract.deliverable||'').replace(/,/g,';'), (inf.contract.cash||'').replace(/,/g,';')
    ]);
  });
  rows.push([]);

  // Weekly compliance grid
  rows.push(['=== WEEKLY COMPLIANCE ===']);
  rows.push(['Influencer', ...WEEKS]);
  influencers.forEach(inf => {
    rows.push([inf.name, ...inf.weekly.map(w => w === 'branded' ? 'Branded' : w === 'posted' ? 'Posted' : w === 'missed' ? 'MISSED' : 'N/A')]);
  });
  rows.push([]);

  // All posts detail
  rows.push(['=== POST DETAILS ===']);
  rows.push(['Influencer','Handle','Post URL','Date','Type','Branded','Likes','Comments','Views','Caption']);
  influencers.forEach(inf => {
    inf.openartPosts.forEach(p => {
      const caption = p.text.replace(/<[^>]*>/g, '').replace(/,/g, ';');
      rows.push([
        inf.name, '@'+inf.handle, p.url || '', p.time,
        p.collab ? 'Collab' : '@Mention', p.branded ? 'Yes' : 'No',
        p.likes || '', p.comments || '', p.views || '', caption
      ]);
    });
  });

  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `openart-influencer-report-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ===== APPLY DELETIONS & EDITS ON LOAD =====
async function applyDeletionsAndEdits() {
  try {
    // Remove deleted posts
    const deleted = await (await fetch('/api/deleted')).json();
    deleted.forEach(d => {
      const inf = influencers.find(i => i.handle === d.handle);
      if (!inf) return;
      const idx = inf.openartPosts.findIndex(p => (p.url && p.url === d.url) || p.time === d.time);
      if (idx >= 0) inf.openartPosts.splice(idx, 1);
    });
    // Apply edits
    const edits = await (await fetch('/api/edits')).json();
    for (const [key, edit] of Object.entries(edits)) {
      const [handle, idxStr] = key.split(':');
      const inf = influencers.find(i => i.handle === handle);
      if (!inf || !inf.openartPosts[parseInt(idxStr)]) continue;
      Object.assign(inf.openartPosts[parseInt(idxStr)], edit);
    }
  } catch(_) {}
}

async function init() {
  await applyDeletionsAndEdits();
  await loadExtraPosts();
  await loadSnapshots();
  influencers.forEach(inf => { inf.weekly = calcWeekly(inf); });
  renderStats();
  renderList();
  selectInf(0);
}
